query StaffRoleById($id: ObjectID!) {
	staffRoleById(id: $id) {
		...StaffRoleEditFields
	}
}

mutation StaffRoleUpdate($input: StaffRoleUpdateInput!) {
	staffRoleUpdate(input: $input) {
		status {
			success
			errorMessage
		}
		staffRole {
			...StaffRoleEditFields
		}
	}
}

fragment StaffRoleEditFields on StaffRole {
	id
	roleName
	enterpriseAppRole
	permissions {
		communityPermissions {
			canManageCommunities
			canManageStaffRolesAndPermissions
			canManageAllCommunities
			canDeleteCommunities
			canChangeCommunityOwner
			canReIndexSearchCollections
		}
		userPermissions {
			canManageUsers
			canAssignStaffUserRoles
		}
		financePermissions {
			canManageFinance
		}
		techAdminPermissions {
			canManageTechAdmin
		}
	}
}
