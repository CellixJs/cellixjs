mutation AdminMembersAccountsAddContainerMemberCreateAccount($input: MemberCreateAccountInput!) {
	memberCreateAccount(input: $input) {
		...AdminMembersAccountsAddContainerMemberMutationResultFields
	}
}

query AdminMembersAccountsAddContainerEndUsersByCommunity($communityId: ObjectID!) {
	endUsersByCommunityId(communityId: $communityId) {
		...AdminMembersAccountsAddContainerEndUserFields
	}
}

fragment AdminMembersAccountsAddContainerMemberMutationResultFields on MemberMutationResult {
	status {
		success
		errorMessage
	}
	member {
		...AdminMembersAccountsAddContainerMemberFields
	}
}

fragment AdminMembersAccountsAddContainerMemberFields on Member {
	memberName
	id
	createdAt
	updatedAt
}

fragment AdminMembersAccountsAddContainerEndUserFields on EndUser {
	id
	displayName
	personalInformation {
		contactInformation {
			email
		}
	}
}
