query AdminSectionLayoutContainerMembersForCurrentEndUser {
	membersForCurrentEndUser {
		...AdminSectionLayoutContainerMemberFields
	}
}

query AdminSectionLayoutContainerCurrentStaffUser {
	currentStaffUserAndCreateIfNotExists {
		...AdminSectionLayoutContainerStaffUserFields
	}
}

fragment AdminSectionLayoutContainerMemberFields on Member {
	id
	memberName
	isAdmin
	community {
		id
		name
	}
}

fragment AdminSectionLayoutContainerStaffUserFields on StaffUser {
	id
	role {
		permissions {
			sectionPermissions {
				canManageCommunities
				canManageUser
				canManageFinance
				canManageTechAdmin
			}
		}
	}
}
