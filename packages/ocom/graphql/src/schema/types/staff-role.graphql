type StaffRoleCommunityPermissions {
	canManageCommunities: Boolean!
	canManageStaffRolesAndPermissions: Boolean!
	canManageAllCommunities: Boolean!
	canDeleteCommunities: Boolean!
	canChangeCommunityOwner: Boolean!
	canReIndexSearchCollections: Boolean!
}

type StaffRoleFinancePermissions {
	canManageFinance: Boolean!
	canViewGLBatchSummaries: Boolean!
	canViewFinanceConfigs: Boolean!
	canCreateFinanceConfigs: Boolean!
}

type StaffRoleTechAdminPermissions {
	canManageTechAdmin: Boolean!
	canViewDatabaseExplorer: Boolean!
	canViewBlobExplorer: Boolean!
	canViewQueueDashboard: Boolean!
	canSendQueueMessages: Boolean!
}

type StaffRoleUserPermissions {
	canManageUsers: Boolean!
	canAssignStaffRoles: Boolean!
	canAssignStaffUserRoles: Boolean! @deprecated(reason: "Use canAssignStaffRoles instead")
	canViewStaffUsers: Boolean!
}

type StaffRoleRolePermissions {
	canViewRoles: Boolean!
	canAddRole: Boolean!
	canEditRole: Boolean!
	canRemoveRole: Boolean!
}

type StaffRolePermissions {
	communityPermissions: StaffRoleCommunityPermissions!
	financePermissions: StaffRoleFinancePermissions!
	staffRolePermissions: StaffRoleRolePermissions!
	techAdminPermissions: StaffRoleTechAdminPermissions!
	userPermissions: StaffRoleUserPermissions!
}

type StaffRole implements MongoBase {
	roleName: String!
	isDefault: Boolean!
	roleType: String
	enterpriseAppRole: String!
	permissions: StaffRolePermissions!

	id: ObjectID!
	schemaVersion: String
	createdAt: DateTime
	updatedAt: DateTime
}

input StaffRoleCreateCommunityPermissionsInput {
	canManageCommunities: Boolean
	canManageStaffRolesAndPermissions: Boolean
	canManageAllCommunities: Boolean
	canDeleteCommunities: Boolean
	canChangeCommunityOwner: Boolean
	canReIndexSearchCollections: Boolean
}

input StaffRoleCreateUserPermissionsInput {
	canManageUsers: Boolean
	canAssignStaffRoles: Boolean
	canAssignStaffUserRoles: Boolean @deprecated(reason: "Use canAssignStaffRoles instead")
	canViewStaffUsers: Boolean
}

input StaffRoleCreateRolePermissionsInput {
	canViewRoles: Boolean
	canAddRole: Boolean
	canEditRole: Boolean
	canRemoveRole: Boolean
}

input StaffRoleCreateFinancePermissionsInput {
	canManageFinance: Boolean
	canViewGLBatchSummaries: Boolean
	canViewFinanceConfigs: Boolean
	canCreateFinanceConfigs: Boolean
}

input StaffRoleCreateTechAdminPermissionsInput {
	canManageTechAdmin: Boolean
	canViewDatabaseExplorer: Boolean
	canViewBlobExplorer: Boolean
	canViewQueueDashboard: Boolean
	canSendQueueMessages: Boolean
}

input StaffRoleCreatePermissionsInput {
	communityPermissions: StaffRoleCreateCommunityPermissionsInput
	staffRolePermissions: StaffRoleCreateRolePermissionsInput
	financePermissions: StaffRoleCreateFinancePermissionsInput
	techAdminPermissions: StaffRoleCreateTechAdminPermissionsInput
	userPermissions: StaffRoleCreateUserPermissionsInput
}

input StaffRoleCreateInput {
	roleName: String!
	enterpriseAppRole: String
	permissions: StaffRoleCreatePermissionsInput
}

input StaffRoleUpdatePermissionsInput {
	communityPermissions: StaffRoleCreateCommunityPermissionsInput
	staffRolePermissions: StaffRoleCreateRolePermissionsInput
	financePermissions: StaffRoleCreateFinancePermissionsInput
	techAdminPermissions: StaffRoleCreateTechAdminPermissionsInput
	userPermissions: StaffRoleCreateUserPermissionsInput
}

input StaffRoleUpdateInput {
	id: ObjectID!
	roleName: String!
	enterpriseAppRole: String!
	permissions: StaffRoleUpdatePermissionsInput
}

type StaffRoleMutationResult implements MutationResult {
	status: MutationStatus!
	staffRole: StaffRole
}

extend type Query {
	staffRoles: [StaffRole!]!
	staffRoleById(id: ObjectID!): StaffRole
}

extend type Mutation {
	staffRoleCreate(input: StaffRoleCreateInput!): StaffRoleMutationResult!
	staffRoleUpdate(input: StaffRoleUpdateInput!): StaffRoleMutationResult!
}