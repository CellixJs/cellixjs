type StaffUser implements MongoBase {
	externalId: String!
	firstName: String!
	lastName: String!
	email: String!
	displayName: String!
	accessBlocked: Boolean!
	tags: [String!]!
	role: StaffRole
	activityLog: [StaffUserActivityDetail!]!

	id: ObjectID!
	schemaVersion: String
	createdAt: DateTime
	updatedAt: DateTime
}

