type StaffUserActivityDetail {
	activityType: String!
	activityDescription: String!
	activityByStaffUserId: String!
	activityByStaffUserDisplayName: String!
	createdAt: DateTime!
	updatedAt: DateTime!
}

type StaffUser implements MongoBase {
	externalId: String!
	firstName: String!
	lastName: String!
	email: String!
	displayName: String!
	accessBlocked: Boolean!
	tags: [String!]!
	role: StaffRole
	activityLog: [StaffUserActivityDetail!]!

	id: ObjectID!
	schemaVersion: String
	createdAt: DateTime
	updatedAt: DateTime
}

input StaffUserAssignRoleInput {
	staffUserId: ObjectID!
	roleId: ObjectID!
}

type StaffUserMutationResult implements MutationResult {
	status: MutationStatus!
	staffUser: StaffUser
}

extend type Query {
	currentStaffUserAndCreateIfNotExists: StaffUser!
	staffUsers: [StaffUser!]!
	staffUserById(id: ObjectID!): StaffUser
}

extend type Mutation {
	staffUserAssignRole(input: StaffUserAssignRoleInput!): StaffUserMutationResult!
}
