query MemberProfileContainerMemberProfile($id: ObjectID!) {
	member(id: $id) {
		...MemberProfileContainerMemberFields
	}
}

mutation MemberProfileContainerMemberUpdateProfile($input: MemberUpdateProfileInput!) {
	memberUpdateProfile(input: $input) {
		status {
			success
			errorMessage
		}
		member {
			...MemberProfileContainerMemberFields
		}
	}
}

fragment MemberProfileContainerMemberFields on Member {
	id
	memberName
	profile {
		name
		email
		bio
		showInterests
		showEmail
		showProfile
		showLocation
		showProperties
	}
	createdAt
	updatedAt
}
