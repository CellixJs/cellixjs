query MemberProfileContainerMemberProfile {
	memberForCurrentCommunity: membersForCurrentEndUser {
		...MemberProfileContainerMemberFields
	}
}

fragment MemberProfileContainerMemberFields on Member {
	id
	memberName
	profile {
		name
		email
		bio
		showInterests
		showEmail
		showProfile
		showLocation
		showProperties
	}
	createdAt
	updatedAt
}
