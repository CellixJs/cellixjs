fragment AdminMemberDetailContainerMemberFields on Member {
	id
	memberName
	community {
		id
	}
	createdAt
	updatedAt
	isAdmin
	profile {
		name
		email
		bio
		avatarDocumentId
	}
	accounts {
		id
		firstName
		lastName
		statusCode
		user {
			id
			externalId
		}
	}
	
}

query AdminMemberDetailContainerMembersByCommunity($communityId: ObjectID!) {
	membersByCommunityId(communityId: $communityId) {
		...AdminMemberDetailContainerMemberFields
	}
}

mutation AdminMemberDetailContainerUpdateMemberRole($input: UpdateMemberRoleInput!) {
	updateMemberRole(input: $input) {
		status {
			success
			errorMessage
		}
		member {
			...AdminMemberDetailContainerMemberFields
		}
	}
}
