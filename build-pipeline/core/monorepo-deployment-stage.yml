parameters:
- name: stageName
  displayName: 'Name of the Stage'
  type: string
- name: environmentNameBicep
  displayName: 'Environment Name in Bicep config- dev/qa/uat/prd'
  type: string
- name: environmentNameDevOps
  displayName: 'Environment Name in DevOps- Dev/QA/UAT/Production'
  type: string
- name: vmImageName
  displayName: 'VM Image - ubuntu-latest'
  type: string
- name: ServiceConnectionName
  displayName: 'Service Connection Name'
  type: string
- name: deploymentDefaultLocation
  displayName: 'Default Location for Deployment'
  type: string
- name: resourceGroupName
  displayName: 'Resource Group Name'
  type: string
- name: appSettingsJsonFileRelativePathPri
  displayName: 'AppSettings Json File Relative Path for Primary instance'
  type: string
- name: frontDoorProfileName
  displayName: 'Front Door Profile Name'
  type: string
- name: frontDoorEndpointName
  displayName: 'Front Door Endpoint Name'
  type: string
- name: frontDoorDomainNameUICommunity
  displayName: 'Front Door Domain Name'
  type: string
- name: frontDoorDomainNameUIStaff
  displayName: 'Front Door Domain Name (UI Staff)'
  type: string
stages:
- stage: ${{parameters.stageName}}
  displayName: ${{parameters.stageName}} stage
  dependsOn: Build
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  # The pipeline runs API and UI Community templates in parallel by default to speed up deployments.
  # UI Staff currently depends on UI Community (see deploy-ui-staff.yml). detect-changes.cjs still emits per-app flags (HAS_FRONTEND_COMMUNITY_CHANGES / HAS_FRONTEND_STAFF_CHANGES)
  # for possible future use; the current CI does not gate PR deployments on those flags to keep PR run behaviour deterministic.
  - template: ../../apps/api/deploy-api.yml
    parameters:
      ServiceConnectionName: ${{parameters.ServiceConnectionName}}
      deploymentDefaultLocation: ${{parameters.deploymentDefaultLocation}}
      resourceGroupName: ${{parameters.resourceGroupName}}
      environmentNameBicep: ${{parameters.environmentNameBicep}}
      environmentNameDevOps: ${{parameters.environmentNameDevOps}}
      vmImageName: ${{parameters.vmImageName}}
      appSettingsJsonFileRelativePathPri: ${{parameters.appSettingsJsonFileRelativePathPri}}
  - template: ../../apps/docs/deploy-docs.yml
    parameters:
      vmImageName: ${{parameters.vmImageName}}
  - template: ../../apps/ui-community/deploy-ui-community.yml
    parameters:
      environmentNameDevOps: ${{parameters.environmentNameDevOps}}
      environmentNameBicep: ${{parameters.environmentNameBicep}}
      vmImageName: ${{parameters.vmImageName}}
      ServiceConnectionName: ${{parameters.ServiceConnectionName}}
      deploymentDefaultLocation: ${{parameters.deploymentDefaultLocation}}
      resourceGroupName: ${{parameters.resourceGroupName}}
      frontDoorProfileName: ${{parameters.frontDoorProfileName}}
      frontDoorEndpointName: ${{parameters.frontDoorEndpointName}}
      frontDoorDomainName: ${{parameters.frontDoorDomainNameUICommunity}}
  - template: ../../apps/ui-staff/deploy-ui-staff.yml
    parameters:
      environmentNameDevOps: ${{parameters.environmentNameDevOps}}
      environmentNameBicep: ${{parameters.environmentNameBicep}}
      vmImageName: ${{parameters.vmImageName}}
      ServiceConnectionName: ${{parameters.ServiceConnectionName}}
      deploymentDefaultLocation: ${{parameters.deploymentDefaultLocation}}
      resourceGroupName: ${{parameters.resourceGroupName}}
      frontDoorProfileName: ${{parameters.frontDoorProfileName}}
      frontDoorEndpointName: ${{parameters.frontDoorEndpointName}}
      frontDoorDomainName: ${{parameters.frontDoorDomainNameUIStaff}}