trigger:
 branches:
   include:
     - main

pr:
  branches:
    include:
     - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: ocm-app-ui-community
  - group: ocm-app-ui-staff
  - group: ocm-common
  - group: edgescan-credential-cellixjs
  - group: github-credential-cellixjs
  - group: snyk-credential-cellixjs
  - group: sonarcloud-credential-cellixjs
  - name: deploymentDefaultLocation
    value: 'eastus2'
  - name: ServiceConnectionName
    value: 'ShareThrift-MSDN'
  - name: vmImageName
    value: 'ubuntu-latest'
  - name: system.debug
    value: true
  - name: pnpm_config_cache
    value: $(Pipeline.Workspace)/.pnpm-store
  - name: SONAR_USER_HOME
    value: $(Pipeline.Workspace)/.sonar

stages:
  - template: ./build-pipeline/core/monorepo-build-stage.yml
    parameters:
      vmImageName: $(vmImageName)
      pnpm_config_cache: $(pnpm_config_cache)
      isPnpmCacheAvailable: 'true'
      disableSonarCloudTasks: 'false'
      SONAR_USER_HOME: $(SONAR_USER_HOME)
      SonarCloud: 'sonarcloud'
      SonarCloud_organization: 'simnova'
      SonarCloud_scannerMode: 'CLI'
      SonarCloud_configMode: 'manual'
      SonarCloud_cliProjectKey: 'simnova_cellix-data-access'
      SonarCloud_cliProjectName: 'cellix-data-access'
      buildEnvSettings:
        VITE_APP_UI_COMMUNITY_B2C_AUTHORITY: $(OCM_APP_UI_COMMUNITY_B2C_AUTHORITY_DEV)
        VITE_APP_UI_COMMUNITY_B2C_CLIENTID: $(OCM_APP_UI_COMMUNITY_B2C_CLIENTID_DEV)
        VITE_APP_UI_COMMUNITY_B2C_REDIRECT_URI: $(OCM_APP_UI_COMMUNITY_B2C_REDIRECT_URI_DEV)
        VITE_APP_UI_COMMUNITY_B2C_SCOPES: $(OCM_APP_UI_COMMUNITY_B2C_SCOPES_DEV)
        VITE_APP_UI_STAFF_AAD_AUTHORITY: $(OCM_APP_UI_STAFF_AAD_AUTHORITY_DEV)
        VITE_APP_UI_STAFF_AAD_CLIENTID: $(OCM_APP_UI_STAFF_AAD_CLIENTID_DEV)
        VITE_APP_UI_STAFF_AAD_REDIRECT_URI: $(OCM_APP_UI_STAFF_AAD_REDIRECT_URI_DEV)
        VITE_APP_UI_STAFF_AAD_SCOPES: $(OCM_APP_UI_STAFF_AAD_SCOPES_DEV)
        VITE_COMMON_API_ENDPOINT: $(OCM_COMMON_API_ENDPOINT_DEV)
        NODE_ENV: $(NODE_ENV)


  - template: ./build-pipeline/core/monorepo-deployment-stage.yml
    parameters:
      stageName: 'DEV'
      environmentNameBicep: 'dev'
      environmentNameDevOps: 'cellix-dev'
      vmImageName: $(vmImageName)
      ServiceConnectionName: $(ServiceConnectionName)
      deploymentDefaultLocation: $(deploymentDefaultLocation)
      resourceGroupName: 'rg-sharethrift'
      appSettingsJsonFileRelativePathPri: 'apps/api/build-pipelines/config/dev-pri.json'
      frontDoorProfileName: 'simnova-afd'
      frontDoorEndpointName: 'ocm-fde-ged3a8gxcvfxafaf'
      frontDoorDomainNameUICommunity: 'ownercommunity.org'
      frontDoorDomainNameUIStaff: 'staff.ownercommunity.org'

  - template: ./build-pipeline/core/monorepo-edgescan-stage.yml
    parameters:
      stageName: 'EdgeScan_DEV'
      dependsOn: 'DEV'
      vmImageName: $(vmImageName)
      esAssetId: $(ES_ASSET_ID_DEV)