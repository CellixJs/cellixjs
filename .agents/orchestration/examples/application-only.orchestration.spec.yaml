# yaml-language-server: $schema=../schema/orchestration-spec.schema.json
version: 1
profile: application-only
classes:
  reusableFramework:
    include: []
  applicationPackages:
    include:
      - apps/**
      - packages/**
  tooling:
    include:
      - .agents/**
      - .github/**
      - package.json
      - pnpm-workspace.yaml
      - turbo.json
  docs:
    include:
      - README.md
      - docs/**
overrides:
  artifactMode: minimal
